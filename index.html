<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Al-Mughalez Specialized Hospital | The Great Transition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;600;700;900&family=IBM+Plex+Sans+Arabic:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-cyan: #00f2ff;
            --accent-blue: #007aff;
            --deep-black: #050505;
            --glass-bg: rgba(15, 15, 15, 0.7);
            --border-glow: rgba(0, 242, 255, 0.15);
            --text-gradient: linear-gradient(135deg, #ffffff 0%, #a1a1a1 100%);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            cursor: default;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--deep-black);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* لمنع التمرير في صفحة الإطلاق */
            perspective: 1000px;
        }

        /* خلفية ديناميكية متطورة */
        .bg-container {
            position: absolute;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #0a192f 0%, #000 100%);
        }

        .bg-grid {
            position: absolute;
            width: 200%; height: 200%;
            top: -50%; left: -50%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(45deg);
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: rotateX(45deg) translateY(0); }
            100% { transform: rotateX(45deg) translateY(50px); }
        }

        /* توهج مركزي خلف المحتوى */
        .glow-sphere {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.1) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(80px);
        }

        .main-frame {
            position: relative;
            width: 90%;
            max-width: 1100px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 60px 30px;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255,255,255,0.02);
            animation: containerEntrance 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes containerEntrance {
            from { opacity: 0; transform: scale(0.95) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* شارة النظام - تصميم كبسولة */
        .system-status {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 179, 0, 0.4);
            border-radius: 100px;
            color: #ffb300;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .blink-dot {
            width: 10px; height: 10px;
            background: #ffb300;
            border-radius: 50%;
            box-shadow: 0 0 15px #ffb300;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* العنوان - تأثير احترافي عريض */
        .hospital-title {
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 25px;
            background: var(--text-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        .description-text {
            /* تعديل الخط للنص المطلوب فقط */
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            color: rgba(255, 255, 255, 0.7);
            max-width: 850px;
            margin: 0 auto 50px;
            line-height: 1.8;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .description-text b { 
            color: var(--primary-cyan); 
            font-weight: 600;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        /* زر الأكشن - النمط الزجاجي المتفاعل */
        .action-btn {
            position: relative;
            overflow: hidden;
            background: #fff;
            color: #000;
            padding: 20px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 100px;
            border: none;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            z-index: 1;
        }

        .action-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 242, 255, 0.3);
            background: var(--primary-cyan);
        }

        /* خط المسح الضوئي الاحترافي */
        .scanner {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--primary-cyan), transparent);
            box-shadow: 0 0 15px var(--primary-cyan);
            animation: scanLoop 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            opacity: 0.6;
            z-index: 2;
        }

        @keyframes scanLoop {
            0% { top: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .footer-tag {
            margin-top: 60px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* تحسينات الشاشات الصغيرة جداً */
        @media (max-width: 480px) {
            .main-frame { 
                padding: 40px 20px; 
                width: 95%;
                border-radius: 25px;
            }
            .hospital-title { font-size: 2.2rem; }
            .action-btn { width: 100%; padding: 18px 30px; }
            .system-status { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="bg-grid"></div>
        <div class="glow-sphere"></div>
    </div>

    <div class="main-frame">
        <div class="scanner"></div>

        <div class="system-status">
            <span class="blink-dot"></span>
            نحو عصر طبي جديد | تحديث الأنظمة الجوهري
        </div>

        <h1 class="hospital-title">مستشفى المغلس<br>التخصصي</h1>
        
        <p class="description-text">
            نعمل على <b>تحول استراتيجي</b> شامل لنرتقي بخدماتنا من عيادة متخصصة إلى مستشفى متكامل ومعتمد دولياً. الأنظمة الرقمية تحت التطوير الآن لإطلاق تجربة رعاية صحية ذكية تفوق التوقعات.
        </p>

        <button class="action-btn" onclick="sysLog(this)">ترقبوا الإطلاق الرسمي</button>

        <div class="footer-tag">
            Next-Gen Hospital Infrastructure &copy; 2026
        </div>
    </div>

    <script>
        function sysLog(btn) {
            btn.innerText = 'سيصلك إشعار عند التدشين';
            btn.style.background = '#00f2ff';
            btn.style.transform = 'scale(0.95)';
            
            // إضافة تأثير اهتزاز خفيف للتأكيد
            btn.animate([
                { transform: 'translateX(0)' },
                { transform: 'translateX(-5px)' },
                { transform: 'translateX(5px)' },
                { transform: 'translateX(0)' }
            ], { duration: 200 });

            console.log("Strategic Transition Initiated: Al-Mughalez Hospital.");
        }
        
        // منع التمرير لضمان تجربة النظام المستقر
        document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
    </script>
</body>
</html>
